<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Window </title>
    <link rel="stylesheet" href="CSS.css" />
    <script src="path/to/JS.js"></script>
</head>

<body style="background-image: url('img/oboi-index.png')">

    <div id="wrapper">
        <div id="header">

            <div class="container">


                <button id="ShowImagePC">
                    <div class="pc">
                        <img src="img/pc.png" alt="" width="80%" height="80%" />
                        <p>ПК</p>
                    </div>
                </button>

                <button id="ShowImageTc">
                    <div class="trashcan">
                        <img src="img/trashcan.png" alt="" width="80%" height="80%" />
                        <p>ДОТА2</p>
                    </div>
                </button>

                <button id="ShowImageImg">
                    <div class="img">
                        <img src="img/img.png" alt="" width="80%" height="80%" />
                        <p>ФОТО</p>
                    </div>
                </button>

                <button id="ShowImageVd">
                    <div class="video">
                        <img src="img/video.png" alt="" width="80%" height="80%" />
                        <p>ВИДЕО</p>
                    </div>
                </button>

                <div class="window">
                    <img id="display-pc" src="img/pc-window.png" style="display: none" />
                    <img id="display-trashcan" src="img/trashcan-window.png" style="display: none" />
                </div>


            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
